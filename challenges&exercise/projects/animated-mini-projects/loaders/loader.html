<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="/challenges&exercise/projects/animated-mini-projects/loaders/loader.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project15-loaders</title>
  </head>
  <body>
    <div class="type">
      <div class="loader"></div>
    </div>

    <div class="type two">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="type three">
      <div class="dotted-loader">
        <span style="--i: 1"></span>
        <span style="--i: 2"></span>
        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
        <span style="--i: 8"></span>
        <span style="--i: 9"></span>
        <span style="--i: 10"></span>
        <span style="--i: 11"></span>
        <span style="--i: 12"></span>
        <span style="--i: 13"></span>
        <span style="--i: 14"></span>
        <span style="--i: 15"></span>
      </div>
    </div>

    <div class="type four">
      <div class="outer-layer">
        <div class="inner-layer">
          <div class="dot-container">
            <span class="bluedot"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="type four-a">
      <div class="outer-layer-a">
        <div class="inner-layer-a">
          <div class="dot-container-a">
            <span class="dot-a"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="type">
      <div class="loader5">
        <div class="dot upper"></div>
        <div class="dot left"></div>
        <div class="dot bottom"></div>
        <div class="dot right"></div>
      </div>
    </div>

    <div class="type five">
      <div class="loader5-a">
        <div class="dot upper-a"></div>
        <div class="dot left-a"></div>
        <div class="dot bottom-a"></div>
        <div class="dot right-a"></div>
      </div>
    </div>

    <div class="type six">
      <div class="loader6"></div>
      <span>LOADING..</span>
    </div>

    <div class="type seven">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>

    <div class="type eight">
      <div class="circle"></div>
    </div>
  </body>
</html>
