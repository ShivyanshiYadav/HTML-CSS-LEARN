<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="/challenges&exercise/projects/credit-card-project/simple-credit-card/credit-card.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project1-credit-card</title>
  </head>
  <body>
    <div class="card">
      <img
        class="card-bg"
        src="/challenges&exercise/projects/credit-card-project/images/bg.png"
        alt="card-base"
      />
      <img
        class="card-logo"
        src="/challenges&exercise/projects/credit-card-project/images/mastercard-logo.png"
        alt="card-logo"
      />
      <span class="card-type">Master Card</span>
      <img
        class="card-chip"
        src="/challenges&exercise/projects/credit-card-project/images/chip.png"
        alt="card-chip"
      />

      <div class="card-number-container">
        <div class="card-number-text">Card Number</div>
        <div class="card-number">8050 8040 2030 3020</div>
      </div>
      <div class="card-info">
        <div class="card-owner-name">Shivyanshi Yadav</div>
        <div class="valid-date-container">
          <div class="valid-day">Valid Thru</div>
          <div class="valid-date">05/28</div>
        </div>
      </div>
    </div>
  </body>
</html>
