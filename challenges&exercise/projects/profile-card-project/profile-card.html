<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--css-->
    <link
      rel="stylesheet"
      href="/challenges&exercise/projects/profile-card-project/profile-card.css"
    />
    <!--boxicons css-->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>project2-profile-card</title>
  </head>
  <body>
    <div class="profile-card">
      <div class="image-box">
        <img
          class="image"
          src="/challenges&exercise/projects/profile-card-project/ovie-doe .jpg"
          alt="profile-image"
        />
      </div>
      <div class="person-info">
        <span class="name">Ovie Doe</span>
        <span class="profession">Youtuber & Blogger</span>
      </div>
      <div class="social-media">
        <div class="icon-box" style="background-color: rgb(17, 89, 196)">
          <i class="bx bxl-facebook"></i>
        </div>

        <div class="icon-box" style="background-color: rgb(29, 185, 237)">
          <i class="bx bxl-twitter"></i>
        </div>

        <div class="icon-box" style="background-color: rgb(211, 11, 114)">
          <i class="bx bxl-instagram"></i>
        </div>

        <div
          class="icon-box"
          style="background-color: rgba(236, 30, 30, 0.974)"
        >
          <i class="bx bxl-youtube"></i>
        </div>
      </div>
      <div class="buttons">
        <button>Subscribe</button>
        <button>Message</button>
      </div>
      <div class="action-bar">
        <div class="action">
          <i class="bx bx-heart"></i>
          <span>100k</span>
        </div>

        <div class="action">
          <i class="bx bx-message-rounded"></i>
          <span>60k</span>
        </div>

        <div class="action">
          <i class="bx bx-share"></i>
          <span>80k</span>
        </div>
      </div>
    </div>
  </body>
</html>
